name: Build Graphical OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc \
          xorriso \
          grub-pc-bin \
          mtools \
          dosfstools

    - name: Build kernel
      run: |
        echo "Building kernel..."
        make clean
        make all

    - name: Create ISO structure
      run: |
        # The Makefile already creates os.iso, just copy it
        cp os.iso graphical-os.iso

    - name: Generate ISO file
      run: |
        echo "ISO already generated by Makefile"
        ls -lh os.iso

    - name: Verify ISO creation
      run: |
        ls -lh *.iso || echo "ISO files:"
        file *.iso || echo "Checking ISO files..."

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: graphical-os-iso
        path: |
          *.iso
        retention-days: 30

    - name: Create Release (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.iso
        body: |
          ## Graphical OS Release
          
          This release contains the bootable ISO for the Graphical OS.
          
          ### Features:
          - VESA Graphics Mode (1024x768)
          - Modern GUI with taskbar
          - Desktop environment with icons
          - Mouse cursor support
          
          ### Installation:
          1. Download the ISO file
          2. Burn to USB or mount in virtual machine
          3. Boot from the media
          
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-qemu:
    runs-on: ubuntu-latest
    needs: build-iso
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc \
          xorriso \
          grub-pc-bin \
          qemu-system-x86

    - name: Build and test in QEMU
      run: |
        # Build the OS using Makefile
        make clean
        make all
        
        # Run QEMU in headless mode for basic testing
        timeout 10 qemu-system-x86_64 \
          -cdrom os.iso \
          -m 512M \
          -display none \
          -serial stdio \
          || echo "QEMU test completed (timeout expected for GUI OS)"
        
        echo "Build and basic test completed successfully!"
