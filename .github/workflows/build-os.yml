name: Build Graphical OS ISO

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc \
          xorriso \
          grub-pc-bin \
          mtools \
          dosfstools

    - name: Build kernel
      run: |
        echo "Building kernel..."
        nasm -f bin boot.asm -o boot.bin
        nasm -f bin kernel.asm -o kernel.bin
        # Combine boot sector and kernel if needed
        cat boot.bin kernel.bin > os-image.bin

    - name: Create ISO structure
      run: |
        mkdir -p iso_root/boot/grub
        
        # Copy kernel files
        cp os-image.bin iso_root/boot/
        
        # Create GRUB configuration
        cat > iso_root/boot/grub/grub.cfg << EOF
        set timeout=5
        set default=0
        
        menuentry "Graphical OS" {
            multiboot /boot/os-image.bin
            boot
        }
        EOF

    - name: Generate ISO file
      run: |
        xorriso -as mkisofs \
          -iso-level 3 \
          -rock \
          -J \
          -V "GRAPHICAL_OS" \
          -A "Graphical Operating System" \
          -sysid "" \
          -b boot/grub/stage2_eltorito \
          -no-emul-boot \
          -boot-load-size 4 \
          -boot-info-table \
          -o graphical-os.iso \
          iso_root/
        
        # Alternative method using grub-mkrescue if available
        if command -v grub-mkrescue &> /dev/null; then
          grub-mkrescue -o graphical-os-alt.iso iso_root/ || true
        fi

    - name: Verify ISO creation
      run: |
        ls -lh *.iso || echo "ISO files:"
        file *.iso || echo "Checking ISO files..."

    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: graphical-os-iso
        path: |
          *.iso
        retention-days: 30

    - name: Create Release (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.iso
        body: |
          ## Graphical OS Release
          
          This release contains the bootable ISO for the Graphical OS.
          
          ### Features:
          - VESA Graphics Mode (1024x768)
          - Modern GUI with taskbar
          - Desktop environment with icons
          - Mouse cursor support
          
          ### Installation:
          1. Download the ISO file
          2. Burn to USB or mount in virtual machine
          3. Boot from the media
          
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-qemu:
    runs-on: ubuntu-latest
    needs: build-iso
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          nasm \
          gcc \
          xorriso \
          grub-pc-bin \
          qemu-system-x86

    - name: Build and test in QEMU
      run: |
        # Build the OS
        nasm -f bin boot.asm -o boot.bin
        nasm -f bin kernel.asm -o kernel.bin
        cat boot.bin kernel.bin > os-image.bin
        
        # Create minimal ISO for testing
        mkdir -p test_iso/boot/grub
        cp os-image.bin test_iso/boot/
        
        cat > test_iso/boot/grub/grub.cfg << EOF
        set timeout=2
        menuentry "Test OS" {
            multiboot /boot/os-image.bin
        }
        EOF
        
        xorriso -as mkisofs \
          -iso-level 3 \
          -rock \
          -J \
          -V "TEST_OS" \
          -b boot/grub/stage2_eltorito \
          -no-emul-boot \
          -boot-load-size 4 \
          -boot-info-table \
          -o test-os.iso \
          test_iso/
        
        # Run QEMU in headless mode for basic testing
        timeout 10 qemu-system-x86_64 \
          -cdrom test-os.iso \
          -m 512M \
          -display none \
          -serial stdio \
          || echo "QEMU test completed (timeout expected for GUI OS)"
        
        echo "Build and basic test completed successfully!"
